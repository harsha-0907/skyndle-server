
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login</title>

<style>
    :root {
        --bg: #0f0f12;
        --card: #17171c;
        --gold: #c6a85a;
        --gold-soft: #a88c3f;
        --text: #e8e6e3;
        --muted: #9f9f9f;
        --error: #d9534f;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .login-card {
        background: var(--card);
        padding: 40px;
        width: 360px;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(198,168,90,0.15);
        border: 1px solid rgba(198,168,90,0.2);
    }

    .login-card h2 {
        text-align: center;
        margin-bottom: 30px;
        color: var(--gold);
        font-weight: 500;
        letter-spacing: 1px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: var(--muted);
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(198,168,90,0.3);
        background: #111;
        color: var(--text);
        outline: none;
        transition: 0.3s ease;
    }

    input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 6px rgba(198,168,90,0.4);
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--gold), var(--gold-soft));
        color: #111;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        opacity: 0.9;
    }

    .error-message {
        margin-top: 15px;
        text-align: center;
        font-size: 14px;
        color: var(--error);
        min-height: 18px;
    }
</style>
</head>

<body>

<div class="login-card">
    <h2>Member Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required />
        </div>

        <button type="submit">Sign In</button>
        <div class="error-message" id="errorMessage"></div>
    </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("errorMessage");

    errorBox.textContent = "";

    try {
        const response = await fetch("/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password }),
            redirect: "follow"
        });

        // If backend sends redirect (302, 303, etc.)
        if (response.redirected) {
            window.location.href = response.url;
            return;
        }

        // Otherwise expect JSON { message: "..." }
        const data = await response.json();

        if (data.message) {
            errorBox.textContent = data.message;
        }

    } catch (err) {
        errorBox.textContent = "Something went wrong. Please try again.";
    }
});
</script>

</body>
</html>
