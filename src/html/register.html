<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register</title>

<style>
    :root {
        --bg: #0f0f12;
        --card: #17171c;
        --gold: #c6a85a;
        --gold-soft: #a88c3f;
        --text: #e8e6e3;
        --muted: #9f9f9f;
        --error: #d9534f;
        --success: #4caf50;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .register-card {
        background: var(--card);
        padding: 40px;
        width: 360px;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(198,168,90,0.15);
        border: 1px solid rgba(198,168,90,0.2);
    }

    .register-card h2 {
        text-align: center;
        margin-bottom: 30px;
        color: var(--gold);
        font-weight: 500;
        letter-spacing: 1px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: var(--muted);
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(198,168,90,0.3);
        background: #111;
        color: var(--text);
        outline: none;
        transition: 0.3s ease;
    }

    input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 6px rgba(198,168,90,0.4);
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--gold), var(--gold-soft));
        color: #111;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        opacity: 0.9;
    }

    .message {
        margin-top: 15px;
        text-align: center;
        font-size: 14px;
        min-height: 18px;
    }

    .error {
        color: var(--error);
    }

    .success {
        color: var(--success);
    }
</style>
</head>

<body>

<div class="register-card">
    <h2>Create Account</h2>
    <form id="registerForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required minlength="5" maxlength="50"/>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="user_name" required minlength="3" maxlength="20"/>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required minlength="8" maxlength="16"/>
        </div>

        <button type="submit">Register</button>
        <div class="message" id="messageBox"></div>
    </form>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const user_name = document.getElementById("user_name").value;
    const password = document.getElementById("password").value;
    const messageBox = document.getElementById("messageBox");

    messageBox.textContent = "";
    messageBox.className = "message";

    try {
        const response = await fetch("/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, user_name, password }),
            redirect: "follow"
        });

        // If backend sends redirect (like RedirectResponse to login)
        if (response.redirected) {
            window.location.href = response.url;
            return;
        }

        const data = await response.json();

        if (data.message) {
            messageBox.textContent = data.message;
            messageBox.classList.add("error");
        }

    } catch (err) {
        messageBox.textContent = "Something went wrong. Please try again.";
        messageBox.classList.add("error");
    }
});
</script>

</body>
</html>
